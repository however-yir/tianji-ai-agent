services:
  redis:
    image: redis:7.2-alpine
    container_name: tianji-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - tianji-redis-data:/data

  mysql:
    image: mysql:8.0
    container_name: tianji-mysql
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tianji
      MYSQL_USER: tianji
      MYSQL_PASSWORD: tianji123
    ports:
      - "3306:3306"
    volumes:
      - tianji-mysql-data:/var/lib/mysql

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: tianji-nacos
    profiles: ["nacos"]
    depends_on:
      - mysql
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: "3306"
      MYSQL_SERVICE_DB_NAME: tianji
      MYSQL_SERVICE_USER: tianji
      MYSQL_SERVICE_PASSWORD: tianji123
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: tianji-elasticsearch
    profiles: ["search"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - tianji-es-data:/usr/share/elasticsearch/data

volumes:
  tianji-redis-data:
  tianji-mysql-data:
  tianji-es-data:

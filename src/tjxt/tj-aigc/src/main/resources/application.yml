server:
  port: 8094  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN:20}
    connection-timeout: 30000
  # SSE 连接超时（AI 流式响应场景需要更长超时）
  servlet:
    session:
      timeout: 30m
spring:
  profiles:
    active: local
  application:
    name: aigc-service
  main:
    allow-circular-references: true # 允许循环引用
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  cloud:
    circuitbreaker:
      resilience4j:
        configs:
          default:
            slidingWindowSize: 10
            failureRateThreshold: 50
            waitDurationInOpenState: 10s
            permittedNumberOfCallsInHalfOpenState: 3
            recordExceptions:
              - java.io.IOException
              - java.util.concurrent.TimeoutException
              - org.springframework.web.client.ResourceAccessException
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
tj:
  swagger:
    enable: true
    package-path: com.tianji.aigc.controller
    title: 天机学堂 - AIGC接口文档
    description: 该服务包含AI相关功能
    contact-name: 传智教育·研究院
    contact-url: http://www.itcast.cn/
    contact-email: zhangzhijun@itcast.cn
    version: v1.0
    enableResponseWrap: true
  auth:
    resource:
      enable: true
      excludeLoginPaths:
        - /chat/text
  jdbc:
    database: tj_aigc #指定使用的数据库名
  # AI 调用性能配置
  ai:
    timeout:
      connect-ms: ${AI_TIMEOUT_CONNECT:10000}
      read-ms: ${AI_TIMEOUT_READ:60000}
    retry:
      max-attempts: ${AI_RETRY_MAX:3}
      backoff-ms: ${AI_RETRY_BACKOFF:1000}
    streaming:
      # SSE 背压缓冲区大小
      buffer-size: ${AI_STREAM_BUFFER_SIZE:256}
    prompt:
    prompt:
      system:
        chat:
          data-id: system-chat-message.txt
          group: DEFAULT_GROUP
          timeout-ms: 20000
        route-agent:
          data-id: route-agent-system-message.txt
        recommend-agent:
          data-id: recommend-agent-system-message.txt
        buy-agent:
          data-id: buy-agent-system-message.txt
        consult-agent:
          data-id: consult-agent-system-message.txt
        knowledge-agent:
          data-id: knowledge-agent-system-message.txt
        text:
          data-id: text-system-chat-message.txt

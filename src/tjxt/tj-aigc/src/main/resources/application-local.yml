spring:
  ai:
    dashscope:
      chat:
        enabled: ${AIGC_DASHSCOPE_CHAT_ENABLED:true}
      embedding:
        enabled: ${AIGC_DASHSCOPE_EMBEDDING_ENABLED:true}
    openai:
      chat:
        enabled: ${AIGC_OPENAI_CHAT_ENABLED:false}
      embedding:
        enabled: ${AIGC_OPENAI_EMBEDDING_ENABLED:false}
  datasource:
    url: ${AIGC_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/tj_aigc?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${AIGC_DATASOURCE_USERNAME:root}
    password: ${AIGC_DATASOURCE_PASSWORD:CHANGE_ME}
    hikari:
      maximum-pool-size: ${AIGC_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${AIGC_HIKARI_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  data:
    redis:
      host: ${AIGC_REDIS_HOST:127.0.0.1}
      port: ${AIGC_REDIS_PORT:6379}
      password: ${AIGC_REDIS_PASSWORD:}
      database: ${AIGC_REDIS_DATABASE:0}
  cloud:
    nacos:
      server-addr: ${AIGC_NACOS_ADDR:192.168.150.101:8848} # nacos注册中心
      config:
        enabled: ${AIGC_NACOS_CONFIG_ENABLED:false}
      username: ${AIGC_NACOS_USERNAME:nacos}
      password: ${AIGC_NACOS_PASSWORD:CHANGE_ME}
      discovery:
        enabled: ${AIGC_NACOS_DISCOVERY_ENABLED:false}
        register-enabled: ${AIGC_NACOS_DISCOVERY_REGISTER_ENABLED:false}
        namespace: f923fb34-cb0a-4c06-8fca-ad61ea61a3f0
        group: DEFAULT_GROUP
        ip: 192.168.150.1
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml # 导入本服务的配置
      - optional:nacos:shared-spring.yaml # 共享spring配置
      - optional:nacos:shared-redis.yaml # 共享redis配置
      - optional:nacos:shared-logs.yaml # 共享日志配置
      - optional:nacos:shared-feign.yaml # 共享feign配置
      - optional:nacos:shared-mybatis.yaml # 共享mybatis配置

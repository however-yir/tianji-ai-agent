server:
  port: 8087  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
  error:
    include-message: always #返回的响应体带上message
spring:
  profiles:
    active: local
  application:
    name: pay-service
tj:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.tianji.pay.controller
    title: 天机学堂 - 支付中心接口文档
    description: 该服务提供微信、支付宝等各种平台的支付、退款等功能
    contact-name: 传智教育·研究院
    contact-url: http://www.itcast.cn/
    contact-email: zhanghuyi@itcast.cn
    version: v1.0
  jdbc:
    database: tj_pay
  pay:
    notifyHost: ${PAY_NOTIFY_HOST:https://example.com/ps}
    ali:
      appId: "${ALI_APP_ID:REPLACE_ME}"
      merchantPrivateKey: "${ALI_MERCHANT_PRIVATE_KEY:REPLACE_ME}"
      publicKey: "${ALI_PUBLIC_KEY:REPLACE_ME}"
    wx:
      appId: "${WX_APP_ID:REPLACE_ME}"
      mchId: "${WX_MCH_ID:REPLACE_ME}"
      mchSerialNo: "${WX_MCH_SERIAL_NO:REPLACE_ME}"
      privateKey: "${WX_PRIVATE_KEY:REPLACE_ME}"
      apiV3Key: "${WX_API_V3_KEY:REPLACE_ME}"

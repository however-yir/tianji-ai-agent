name: tianji-ai-agent CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend-chat-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/chat-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/chat-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  build-tjxt-aigc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile tjxt + tj-aigc dependency chain
        run: mvn -B -ntp -f 代码/tjxt/pom.xml -pl tj-aigc -am -DskipTests package

      - name: Run tj-aigc unit tests
        run: mvn -B -ntp -f 代码/tjxt/tj-aigc/pom.xml test

  compile-my-spring-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile my-spring-ai module
        run: mvn -B -ntp -f 代码/my-spring-ai/pom.xml -DskipTests package

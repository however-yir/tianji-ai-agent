name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  maven-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven smoke build (openai-java-demo)
        run: mvn -B -ntp -f "代码/openai-java-demo/pom.xml" -DskipTests compile

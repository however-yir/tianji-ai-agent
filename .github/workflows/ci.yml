name: tianji-ai-agent CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  compile-core-module:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile my-spring-ai module
        run: mvn -B -ntp -f 代码/my-spring-ai/pom.xml -DskipTests package

name: tianji-ai-agent CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-business-path:
    name: Core Business Path
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/chat-ui/package-lock.json

      - name: Frontend lint, test, build
        working-directory: web/chat-ui
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm run test:run
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Python smoke tests
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pytest
          pytest -q tests

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install tj-aigc dependency chain
        run: mvn -B -ntp -f src/tjxt/pom.xml -pl tj-aigc -am -DskipTests install

      - name: Run tj-aigc unit tests
        run: mvn -B -ntp -f src/tjxt/tj-aigc/pom.xml test

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jacoco-report
          path: src/tjxt/tj-aigc/target/site/jacoco/

      - name: Compile Spring AI sample
        run: mvn -B -ntp -f src/my-spring-ai/pom.xml -DskipTests package

      - name: Compile OpenAI Java sample
        run: mvn -B -ntp -f src/openai-java-demo/pom.xml -DskipTests package

  advisory-python-quality:
    name: Advisory Python Quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Ruff advisory
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff
          ruff check tests scripts

      - name: Compile advisory Python files
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m compileall -q tests scripts

  advisory-secret-scan:
    name: Advisory Secret Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks advisory
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  advisory-java-quality:
    name: Advisory Java Quality (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install tj-aigc dependency chain
        run: mvn -B -ntp -f src/tjxt/pom.xml -pl tj-aigc -am -DskipTests install

      - name: Checkstyle advisory
        continue-on-error: true
        run: mvn -B -ntp -f src/tjxt/tj-aigc/pom.xml checkstyle:check

      - name: SpotBugs advisory
        continue-on-error: true
        run: mvn -B -ntp -f src/tjxt/tj-aigc/pom.xml spotbugs:check

  advisory-owasp-scan:
    name: Advisory OWASP Dependency Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: OWASP dependency check advisory
        continue-on-error: true
        run: mvn -B -ntp -f src/tjxt/tj-aigc/pom.xml org.owasp:dependency-check-maven:check

  advisory-image-scan:
    name: Advisory Container Image Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trivy filesystem scan (tj-aigc Dockerfile)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: 'src/tjxt/tj-aigc'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Trivy filesystem scan (chat-ui Dockerfile)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: 'web/chat-ui'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

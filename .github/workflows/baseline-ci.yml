name: Baseline CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-business-path:
    name: Core Business Path
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/chat-ui/package-lock.json

      - name: Frontend lint, test, build
        working-directory: web/chat-ui
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm run test:run
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python smoke tests
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pytest
          pytest -q tests

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install tj-aigc dependency chain
        run: mvn -B -ntp -f 代码/tjxt/pom.xml -pl tj-aigc -am -DskipTests install

      - name: Run tj-aigc unit tests
        run: mvn -B -ntp -f 代码/tjxt/tj-aigc/pom.xml test

      - name: Compile Spring AI sample
        run: mvn -B -ntp -f 代码/my-spring-ai/pom.xml -DskipTests package

      - name: Compile OpenAI Java sample
        run: mvn -B -ntp -f 代码/openai-java-demo/pom.xml -DskipTests package

  advisory-python-quality:
    name: Advisory Python Quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ruff advisory
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff
          ruff check tests scripts

      - name: Compile advisory Python files
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m compileall -q tests scripts

  advisory-secret-scan:
    name: Advisory Secret Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks advisory
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
